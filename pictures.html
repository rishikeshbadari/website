<!DOCTYPE html>

    <!-- Preload the first (LCP) image for instant display -->

          href="pictures/thumbs/1.webp"
          imagesrcset="pictures/thumbs/1.webp 600w, pictures/optimized/1.webp 1600w"
          imagesizes="(max-width: 479px) calc(100vw - 32px), (max-width: 767px) calc(50vw - 28px), (max-width: 1200px) calc(33vw - 40px), 350px">

<body>
    <!-- Decorative flowing lines -->
    <svg class="home-lines" aria-hidden="true" viewBox="0 0 1440 900" preserveAspectRatio="none">

    <script>
        (function() {
            var s = document.querySelector('.home-lines');
            if (sessionStorage.getItem('linesDrawn')) { s.classList.add('no-draw'); }
            else { sessionStorage.setItem('linesDrawn', '1'); }
        })();
    </script>
