<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pictures - Rishikesh Badari</title>
    <meta name="description" content="Photography by Rishikesh Badari.">
    <meta property="og:title" content="Pictures - Rishikesh Badari">
    <meta property="og:description" content="Photography by Rishikesh Badari.">
    <meta property="og:type" content="website">

    <!-- Prevent flash by setting background immediately -->
    <style>
        html, body { 
            background-color: #ffffff; 
            margin: 0; 
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        /* Critical CSS for immediate render */
        .container { 
            width: 100%; 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 0 24px; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header { 
            padding: 32px 0; 
            border-bottom: 1px solid #f0f0f0; 
        }
        .nav-v3 { 
            display: flex; 
            justify-content: center; 
            gap: 40px; 
        }
        .landing-link-about { 
            color: #666666; 
            text-decoration: none; 
            font-weight: 500; 
        }
        .landing-link-about.w--current { 
            color: #1a1a1a; 
            font-weight: 600; 
        }
        .top-banner {
            margin: 24px 0 8px 0;
            padding: 14px 18px;
            background: linear-gradient(180deg, #fafafa, #f4f6f8);
            border: 1px solid #ededed;
            border-radius: 12px;
            text-align: center;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .top-banner a {
            color: #007bff;
            text-decoration: none;
        }
        .top-banner a:hover {
            text-decoration: underline;
        }
        .top-banner .banner-text {
            color: #444444;
            font-weight: 500;
        }
        .top-banner .ig-handle {
            display: inline-block;
            padding: 8px 14px;
            background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: #ffffff;
            border-radius: 999px;
            font-weight: 600;
            letter-spacing: 0.2px;
            box-shadow: 0 2px 8px rgba(220, 39, 67, 0.25);
            text-decoration: none;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .top-banner .ig-handle:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 14px rgba(220, 39, 67, 0.35);
            text-decoration: none;
        }
        /* Critical gallery CSS */
        .image-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }
        /* Hide captions and modal text to show just pictures */
        .photo-caption { display: none; }
        .modal-info { display: none; }
    </style>
    
    <!-- Performance optimizations -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    
    <!-- Optimized font loading -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Load full CSS after critical rendering -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- Preload critical resources -->
    <link rel="preload" href="gallery-data.js" as="script">
    <link rel="preload" href="script.js" as="script">
    <link rel="preload" href="page-transitions.js" as="script">
</head>
<body>
    <div class="container">
        <header>
            <nav class="nav-v3">
                <a href="/" class="landing-link-about">Home</a>
                <a href="/pictures.html" class="landing-link-about w--current">Pictures</a>
                <a href="/projects.html" class="landing-link-about">Projects</a>
            </nav>
        </header>
        
        <main class="pictures-page">
            <div id="image-gallery" class="image-gallery">
                <!-- Images will be dynamically inserted here -->
            </div>
        </main>
    </div>

    <script src="gallery-data.js"></script>
    <script src="script.js"></script>
    
    <!-- Page transition optimization -->
    <script src="page-transitions.js"></script>
</body>
</html>
