<!DOCTYPE html>
<html lang="en" style="background:#141414;color-scheme:dark;">
<head>
    <meta charset="UTF-8">
    <meta name="color-scheme" content="dark">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - Rishikesh Badari</title>
    <meta name="description" content="Projects by Rishikesh Badari. Machine learning, fractals, and more.">
    <meta property="og:title" content="Projects - Rishikesh Badari">
    <meta property="og:description" content="Projects by Rishikesh Badari. Machine learning, fractals, and more.">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#141414">

    <!-- Critical paint shell: render dark immediately, then progressively enhance. -->
    <style>
        :root { color-scheme: dark; background: #141414; }
        html { background: #141414; }
        body { margin: 0; background: #141414; color: #e8e8e8; }
        #boot-cover { position: fixed; inset: 0; z-index: 2147483647; background: #141414; pointer-events: none; transition: opacity 0.18s ease; }
        @media (prefers-reduced-motion: reduce) { #boot-cover { transition: none; } }
    </style>
    <noscript><style>#boot-cover { display: none; }</style></noscript>
    <script>if(sessionStorage.getItem('internalNav'))document.documentElement.classList.add('internal-nav')</script>

    <!-- Optimized font loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'"><noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"></noscript>

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/projects.css">

    <!-- Preload page transition script -->
    <link rel="preload" href="js/page-transitions.js" as="script">
</head>
<body style="background:#141414;color:#e8e8e8;">
    <div id="boot-cover" aria-hidden="true"></div>
    <!-- Decorative flowing lines -->
    <svg class="home-lines" aria-hidden="true">
        <path class="hline hline-lt1" pathLength="1" />
        <path class="hline hline-lt2" pathLength="1" />
        <path class="hline hline-lt3" pathLength="1" />
        <path class="hline hline-rb1" pathLength="1" />
        <path class="hline hline-rb2" pathLength="1" />
        <path class="hline hline-rb3" pathLength="1" />
    </svg>
    <script src="js/lines.js"></script>

    <div class="container">
        <header>
            <nav class="nav-v3">
                <a href="/" class="landing-link-about">Home</a>
                <a href="/projects.html" class="landing-link-about w--current">Projects</a>
                <a href="https://www.instagram.com/bonelessorb/" target="_blank" rel="noopener noreferrer" class="landing-link-about">Pictures</a>
                <a href="/blog.html" class="landing-link-about">Blog</a>
            </nav>
        </header>

        <main>
            <div class="projects-container">
                <!-- QuizBowl Project -->
                <article class="project-card" data-project="quizbowl">
                    <h3>QuizBowl</h3>
                    <a href="#" class="project-link">View Project</a>
                </article>

                <!-- Fine-tuning LLMs Project -->
                <article class="project-card" data-project="llm-classification">
                    <h3>Fine-tuning LLMs for Classification Tasks</h3>
                    <a href="#" class="project-link">View Project</a>
                </article>

                <!-- Olympic Wins Project -->
                <article class="project-card" data-project="olympic-wins">
                    <h3>Predictive Analysis for Olympic Wins</h3>
                    <a href="#" class="project-link">View Project</a>
                </article>

                <!-- Fractals Project -->
                <article class="project-card" data-project="fractals">
                    <h3>Fractals</h3>
                    <a href="#" class="project-link">View Project</a>
                </article>

                <!-- Snake Project -->
                <article class="project-card" data-project="snake-game">
                    <h3>Snake</h3>
                    <a href="#" class="project-link">View Project</a>
                </article>

            </div>

            <!-- Project Modal -->
            <div class="project-modal" id="projectModal" role="dialog" aria-modal="true" aria-label="Project details">
                <div class="project-modal-content">
                    <button class="project-modal-close" id="projectModalClose" aria-label="Close">&times;</button>

                    <div class="project-modal-scroll">
                        <div class="project-modal-readme">
                            <div class="readme-content" id="modalReadmeContent">
                                <!-- README content will be inserted here -->
                            </div>
                            <div class="project-links" id="modalProjectLinks" style="display: none;">
                                <!-- Project links will be inserted here -->
                            </div>
                        </div>

                        <div class="project-modal-demo" id="modalProjectDemo">
                            <!-- Demo content will be inserted here -->
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        (function () {
            var bootCover = document.getElementById('boot-cover');
            if (!bootCover) return;
            requestAnimationFrame(function () {
                requestAnimationFrame(function () {
                    bootCover.style.opacity = '0';
                    setTimeout(function () {
                        if (bootCover.parentNode) bootCover.parentNode.removeChild(bootCover);
                    }, 220);
                });
            });
        })();
    </script>
    <script src="js/modal.js"></script>
    <script src="data/projects-data.js"></script>
    <script src="js/projects.js"></script>
    <script src="js/page-transitions.js"></script>
</body>
</html>
