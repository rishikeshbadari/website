<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Rishikesh Badari</title>
    <meta name="description" content="Blog by Rishikesh Badari.">
    <meta property="og:title" content="Blog - Rishikesh Badari">
    <meta property="og:description" content="Blog by Rishikesh Badari.">
    <meta property="og:type" content="website">

    <!-- Prevent flash -->
    <style>
        html { background-color: #ffffff; }
        body { opacity: 0; }
    </style>

    <!-- Optimized font loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/blog.css">

    <!-- Preload page transition script -->
    <link rel="preload" href="js/page-transitions.js" as="script">
</head>
<body>
    <!-- Decorative flowing lines -->
    <svg class="home-lines" aria-hidden="true" viewBox="0 0 1440 900" preserveAspectRatio="none">
        <path class="hline hline-lt1" d="M-100,800 C150,620 350,320 550,-50" />
        <path class="hline hline-lt2" d="M-50,900 C250,700 480,380 700,-80" />
        <path class="hline hline-lt3" d="M-200,720 C80,540 280,220 420,-100" />
        <path class="hline hline-rb1" d="M1540,100 C1320,320 1120,600 950,950" />
        <path class="hline hline-rb2" d="M1500,0 C1280,230 1050,530 850,1000" />
        <path class="hline hline-rb3" d="M1620,220 C1400,400 1230,660 1100,950" />
    </svg>
    <script>
        (function() {
            var s = document.querySelector('.home-lines');
            if (sessionStorage.getItem('linesDrawn')) { s.classList.add('no-draw'); }
            else { sessionStorage.setItem('linesDrawn', '1'); }
        })();
    </script>

    <div class="container">
        <header>
            <nav class="nav-v3">
                <a href="/" class="landing-link-about">Home</a>
                <a href="/pictures.html" class="landing-link-about">Pictures</a>
                <a href="/projects.html" class="landing-link-about">Projects</a>
                <a href="/blog.html" class="landing-link-about w--current">Blog</a>
                <a href="/art.html" class="landing-link-about">Favorite Stuff</a>
            </nav>
        </header>

        <main>
            <div class="blog-container" id="blog-container">
                <!-- Blog cards are generated by blog.js -->
            </div>

            <!-- Blog Post Modal -->
            <div class="project-modal" id="blogModal" role="dialog" aria-modal="true" aria-label="Blog post">
                <div class="project-modal-content">
                    <button class="project-modal-close" id="blogModalClose" aria-label="Close">&times;</button>
                    <div class="project-modal-scroll">
                        <div class="blog-modal-body" id="blogModalContent">
                            <!-- Rendered markdown will be inserted here -->
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="vendor/marked.min.js"></script>
    <script src="data/blog-data.js"></script>
    <script src="js/blog.js"></script>
    <script src="js/page-transitions.js"></script>
</body>
</html>
