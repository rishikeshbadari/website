<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Rishikesh Badari</title>
    <meta name="description" content="Blog by Rishikesh Badari.">
    <meta property="og:title" content="Blog - Rishikesh Badari">
    <meta property="og:description" content="Blog by Rishikesh Badari.">
    <meta property="og:type" content="website">

    <!-- Prevent flash by setting background immediately -->
    <style>
        html, body {
            background-color: #ffffff;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        /* Critical CSS for immediate render */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            padding: 32px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .nav-v3 {
            display: flex;
            justify-content: center;
            gap: 40px;
        }
        .landing-link-about {
            color: #666666;
            text-decoration: none;
            font-weight: 500;
        }
        .landing-link-about.w--current {
            color: #1a1a1a;
            font-weight: 600;
        }
    </style>

    <!-- Optimized font loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Load full CSS after critical rendering -->
    <link rel="stylesheet" href="styles.css">

    <!-- Preload page transition script -->
    <link rel="preload" href="page-transitions.js" as="script">
</head>
<body>
    <div class="container">
        <header>
            <nav class="nav-v3">
                <a href="/" class="landing-link-about">Home</a>
                <a href="/pictures.html" class="landing-link-about">Pictures</a>
                <a href="/projects.html" class="landing-link-about">Projects</a>
                <a href="/blog.html" class="landing-link-about w--current">Blog</a>
            </nav>
        </header>

        <main>
            <div class="blog-container" id="blog-container">
                <!-- Blog cards are generated by blog.js -->
            </div>

            <!-- Blog Post Modal -->
            <div class="project-modal" id="blogModal" role="dialog" aria-modal="true" aria-label="Blog post">
                <div class="project-modal-content">
                    <button class="project-modal-close" id="blogModalClose" aria-label="Close">&times;</button>
                    <div class="project-modal-scroll">
                        <div class="blog-modal-body" id="blogModalContent">
                            <!-- Rendered markdown will be inserted here -->
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Markdown parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Blog data and functionality -->
    <script src="blog-data.js"></script>
    <script src="blog.js"></script>

    <!-- Page transition optimization -->
    <script src="page-transitions.js"></script>
</body>
</html>
