<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julia Set Fractal</title>
    <style>
        body {
            margin: 0;
            padding: 20px 20px 0 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        canvas {
            border: none;
            background: #000;
            border-radius: 0;
            outline: none;
            box-shadow: none;
        }
        .info {
            max-width: 600px;
            margin-top: 20px;
            text-align: center;
            color: #ccc;
        }
        .status {
            margin-top: 10px;
            color: #1a1a1a;
            font-size: 14px;
            display: none;
        }
        #startRender {
            margin-top: 12px;
            padding: 10px 18px;
            background: #1f2937;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: none;
            transition: transform 0.15s ease, opacity 0.2s ease;
        }
        #startRender:hover {
            transform: translateY(-1px);
            background: #374151;
        }
        #startRender:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <canvas id="canvas" width="600" height="600"></canvas>
    <div class="status" id="status"></div>
    <button id="startRender">Render</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusElement = document.getElementById('status');
        const startBtn = document.getElementById('startRender');
        
        let isRendering = false;
        
        function julia(x, y, cReal, cImag) {
            let zReal = x;
            let zImag = y;
            let iteration = 0;
            const maxIterations = 100;
            
            while (zReal*zReal + zImag*zImag <= 4 && iteration < maxIterations) {
                const zRealTemp = zReal*zReal - zImag*zImag + cReal;
                zImag = 2*zReal*zImag + cImag;
                zReal = zRealTemp;
                iteration++;
            }
            
            return iteration;
        }
        
        function getColor(iteration) {
            const maxIterations = 100;
            if (iteration === maxIterations) {
                return [0, 0, 0];
            }
            const t = iteration / maxIterations;
            const r = Math.floor(255 * (0.5 + 0.5 * Math.cos(3.0 + t * 12.0)));
            const g = Math.floor(255 * (0.5 + 0.5 * Math.cos(3.0 + t * 12.0 + 2.0)));
            const b = Math.floor(255 * (0.5 + 0.5 * Math.cos(3.0 + t * 12.0 + 4.0)));
            return [r, g, b];
        }
        
        let abortController = null;

        async function render(cReal, cImag) {
            if (isRendering) return;
            isRendering = true;
            if (startBtn) {
                startBtn.disabled = true;
            }

            abortController = new AbortController();
            const { signal } = abortController;

            const zoom = 300;
            const offsetX = canvas.width / 2;
            const offsetY = canvas.height / 2;

            for (let py = 0; py < canvas.height; py++) {
                if (signal.aborted) break;
                const rowImage = ctx.createImageData(canvas.width, 1);
                const rowData = rowImage.data;

                for (let px = 0; px < canvas.width; px++) {
                    if (signal.aborted) break;
                    const x = (px - offsetX) / zoom;
                    const y = (py - offsetY) / zoom;

                    const iteration = julia(x, y, cReal, cImag);
                    const [r, g, b] = getColor(iteration);

                    const idx = px * 4;
                    rowData[idx] = r;
                    rowData[idx + 1] = g;
                    rowData[idx + 2] = b;
                    rowData[idx + 3] = 255;
                }

                ctx.putImageData(rowImage, 0, py);

                if (py % 8 === 0) {
                    await new Promise(resolve => setTimeout(resolve, 16));
                }
            }

            isRendering = false;
            if (startBtn) {
                startBtn.disabled = false;
                startBtn.textContent = 'Render';
            }
        }
        
        // Attach button: fixed c value; clicking again resets
        const cDefault = { real: -0.7, imag: 0.27015 };
        if (startBtn) {
            startBtn.addEventListener('click', () => {
                if (isRendering && abortController) {
                    abortController.abort();
                }
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                render(cDefault.real, cDefault.imag);
            });
        }
    </script>
</body>
</html>
