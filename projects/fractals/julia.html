<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julia Set Fractal</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        canvas {
            border: 1px solid #333;
            background: #000;
            border-radius: 8px;
        }
        .info {
            max-width: 600px;
            margin-top: 20px;
            text-align: center;
            color: #ccc;
        }
        .status {
            margin-top: 10px;
            color: #FFD700;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>Julia Set Fractal</h1>
    <canvas id="canvas" width="600" height="600"></canvas>
    <div class="status" id="status">Generating Julia Sets...</div>
    <div class="info">
        <p>Julia Sets are generated by iterating z_{n+1} = z_n² + c for each point z in the complex plane, using a fixed complex number c. Watch as different values of c create dramatically different fractal patterns.</p>
        <p>Current pattern: <span id="currentPattern">Dragon</span> | c = <span id="currentC">-0.7 + 0.27015i</span></p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusElement = document.getElementById('status');
        const currentPatternElement = document.getElementById('currentPattern');
        const currentCElement = document.getElementById('currentC');
        
        let patternIndex = 0;
        let isRendering = false;
        
        // Different Julia set patterns to cycle through
        const patterns = [
            { real: -0.7, imag: 0.27015, name: "Dragon", duration: 4000 },
            { real: -0.835, imag: -0.2321, name: "Spiral", duration: 4000 },
            { real: -0.8, imag: 0.156, name: "Lightning", duration: 4000 },
            { real: 0.285, imag: 0.01, name: "Flower", duration: 4000 },
            { real: -0.4, imag: 0.6, name: "Dendrite", duration: 4000 },
            { real: -0.75, imag: 0.11, name: "Airplane", duration: 4000 },
            { real: -0.54, imag: 0.54, name: "Butterfly", duration: 4000 },
            { real: 0.3, imag: 0.5, name: "Peacock", duration: 4000 }
        ];
        
        function julia(x, y, cReal, cImag) {
            let zReal = x;
            let zImag = y;
            let iteration = 0;
            const maxIterations = 100;
            
            while (zReal*zReal + zImag*zImag <= 4 && iteration < maxIterations) {
                const zRealTemp = zReal*zReal - zImag*zImag + cReal;
                zImag = 2*zReal*zImag + cImag;
                zReal = zRealTemp;
                iteration++;
            }
            
            return iteration;
        }
        
        function getColor(iteration) {
            const maxIterations = 100;
            if (iteration === maxIterations) {
                return [0, 0, 0]; // Black for points in the set
            }
            
            const t = iteration / maxIterations;
            // Create a vibrant color palette that changes over time
            const timeOffset = (Date.now() / 2000) % (2 * Math.PI);
            const r = Math.floor(255 * (0.5 + 0.5 * Math.sin(3.0 + t * 5.0 + timeOffset)));
            const g = Math.floor(255 * (0.5 + 0.5 * Math.sin(3.0 + t * 5.0 + timeOffset + 2.0)));
            const b = Math.floor(255 * (0.5 + 0.5 * Math.sin(3.0 + t * 5.0 + timeOffset + 4.0)));
            
            return [r, g, b];
        }
        
        async function render(cReal, cImag) {
            if (isRendering) return;
            isRendering = true;
            statusElement.textContent = 'Rendering...';
            
            const imageData = ctx.createImageData(canvas.width, canvas.height);
            const data = imageData.data;
            
            const zoom = 300;
            const offsetX = canvas.width / 2;
            const offsetY = canvas.height / 2;
            
            for (let py = 0; py < canvas.height; py++) {
                for (let px = 0; px < canvas.width; px++) {
                    const x = (px - offsetX) / zoom;
                    const y = (py - offsetY) / zoom;
                    
                    const iteration = julia(x, y, cReal, cImag);
                    const [r, g, b] = getColor(iteration);
                    
                    const index = (py * canvas.width + px) * 4;
                    data[index] = r;
                    data[index + 1] = g;
                    data[index + 2] = b;
                    data[index + 3] = 255;
                }
                
                // Update progress occasionally
                if (py % 25 === 0) {
                    const progress = Math.floor((py / canvas.height) * 100);
                    statusElement.textContent = `Rendering... ${progress}%`;
                    await new Promise(resolve => setTimeout(resolve, 1));
                }
            }
            
            ctx.putImageData(imageData, 0, 0);
            statusElement.textContent = 'Cycling through beautiful Julia Set patterns';
            isRendering = false;
        }
        
        async function animatePatterns() {
            const currentPattern = patterns[patternIndex];
            
            // Update display info
            currentPatternElement.textContent = currentPattern.name;
            currentCElement.textContent = `${currentPattern.real.toFixed(3)} + ${currentPattern.imag.toFixed(3)}i`;
            
            await render(currentPattern.real, currentPattern.imag);
            
            setTimeout(() => {
                patternIndex = (patternIndex + 1) % patterns.length;
                animatePatterns();
            }, currentPattern.duration);
        }
        
        // Start the animation sequence
        setTimeout(() => {
            animatePatterns();
        }, 1000);
    </script>
</body>
</html>
