<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barnsley Fern Fractal</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #e8e8e8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-sizing: border-box;
        }
        canvas {
            border: none;
            background: #000;
            border-radius: 0;
            outline: none;
            box-shadow: none;
            max-width: 100%;
            max-height: calc(100vh - 80px);
        }
        #toggleRender {
            margin-top: 12px;
            padding: 10px 18px;
            background: #1f2937;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: none;
            transition: transform 0.15s ease, opacity 0.2s ease;
        }
        #toggleRender:hover {
            transform: translateY(-1px);
            background: #374151;
        }
        #toggleRender:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <button id="toggleRender">Start Render</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        const size = Math.min(window.innerWidth, window.innerHeight) - 80;
        canvas.width  = size;
        canvas.height = size;
        
        let animationId;
        let pointCount = 0;
        let x = 0, y = 0;
        const toggleBtn = document.getElementById('toggleRender');
        
        // Barnsley Fern transformations
        const transforms = [
            { a: 0, b: 0, c: 0, d: 0.16, e: 0, f: 0, p: 0.01 },
            { a: 0.85, b: 0.04, c: -0.04, d: 0.85, e: 0, f: 1.6, p: 0.85 },
            { a: 0.2, b: -0.26, c: 0.23, d: 0.22, e: 0, f: 1.6, p: 0.07 },
            { a: -0.15, b: 0.28, c: 0.26, d: 0.24, e: 0, f: 0.44, p: 0.07 }
        ];
        
        function getRandomTransform() {
            const r = Math.random();
            let sum = 0;
            for (let i = 0; i < transforms.length; i++) {
                sum += transforms[i].p;
                if (r <= sum) return transforms[i];
            }
            return transforms[transforms.length - 1];
        }
        
        // Random color parameters (set each Start Render)
        let hueBase = 120;
        let hueScale = 10;
        let sat = 70;
        let light = 50;

        function drawPoint(x, y) {
            const screenX = (x + 3) * canvas.width / 6;
            const screenY = canvas.height - (y * canvas.height / 10);
            
            ctx.fillStyle = `hsl(${(hueBase + y * hueScale) % 360}, ${sat}%, ${light}%)`;
            ctx.fillRect(screenX, screenY, 1, 1);
        }
        
        function iterate() {
            const transform = getRandomTransform();
            const newX = transform.a * x + transform.b * y + transform.e;
            const newY = transform.c * x + transform.d * y + transform.f;
            
            x = newX;
            y = newY;
            
            if (pointCount > 20) { // Skip first few points
                drawPoint(x, y);
            }
            
            pointCount++;
        }
        
        function animate() {
            for (let i = 0; i < 100; i++) {
                iterate();
            }
            animationId = requestAnimationFrame(animate);
        }
        
        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            pointCount = 0;
            x = 0;
            y = 0;
        }
        
        if (toggleBtn) {
            toggleBtn.addEventListener('click', () => {
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                    toggleBtn.textContent = 'Start Render';
                } else {
                    // Randomize color parameters for this render
                    hueBase = Math.floor(Math.random() * 360);
                    hueScale = 5 + Math.random() * 25;
                    sat = 60 + Math.random() * 30;
                    light = 45 + Math.random() * 20;
                    clearCanvas();
                    animate();
                    toggleBtn.textContent = 'Stop Render';
                }
            });
        }
    </script>
</body>
</html>
