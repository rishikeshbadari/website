<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandelbrot Set Fractal</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        canvas {
            border: none;
            background: #000;
            border-radius: 0;
            outline: none;
            box-shadow: none;
        }
        .info {
            max-width: 600px;
            margin-top: 20px;
            text-align: center;
            color: #ccc;
        }
        .status {
            margin-top: 10px;
            color: #FFD700;
            font-size: 14px;
        }
        #startRender {
            margin-top: 12px;
            padding: 10px 18px;
            background: #1f2937; /* gray-800 */
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: none;
            transition: transform 0.15s ease, opacity 0.2s ease;
        }
        #startRender:hover {
            transform: translateY(-1px);
            background: #374151; /* gray-700 */
        }
        #startRender:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <canvas id="canvas" width="600" height="600"></canvas>
    <div class="status" id="status"></div>
    <button id="startRender">Render</button>
    

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusElement = document.getElementById('status');
        const startBtn = document.getElementById('startRender');
        
        let isRendering = false;
        // Random color palette seed (set each render)
        let colorPhase0 = 0;
        let colorPhase1 = 2.0;
        let colorPhase2 = 4.0;
        let colorFreq = 12.0;
        
        // Single static view parameters
        const defaultView = { centerX: -0.5, centerY: 0, zoom: 1 };
        
        function mandelbrot(cx, cy, maxIter = 100) {
            let x = 0, y = 0;
            let iteration = 0;
            
            while (x*x + y*y <= 4 && iteration < maxIter) {
                const xtemp = x*x - y*y + cx;
                y = 2*x*y + cy;
                x = xtemp;
                iteration++;
            }
            
            return iteration;
        }
        
        function getColor(iteration, maxIter) {
            if (iteration === maxIter) {
                return [0, 0, 0]; // Black for points in the set
            }
            
            const t = iteration / maxIter;
            const r = Math.floor(255 * (0.5 + 0.5 * Math.cos(colorPhase0 + t * colorFreq)));
            const g = Math.floor(255 * (0.5 + 0.5 * Math.cos(colorPhase1 + t * colorFreq)));
            const b = Math.floor(255 * (0.5 + 0.5 * Math.cos(colorPhase2 + t * colorFreq)));
            
            return [r, g, b];
        }
        
        let abortController = null;

        async function render(centerX, centerY, zoom) {
            if (isRendering) return;
            isRendering = true;
            if (startBtn) {
                startBtn.disabled = true;
            }

            // Randomize color palette for this render
            colorPhase0 = Math.random() * Math.PI * 2;
            colorPhase1 = Math.random() * Math.PI * 2;
            colorPhase2 = Math.random() * Math.PI * 2;
            colorFreq = 8 + Math.random() * 16;

            // Allow render to be aborted and restarted
            abortController = new AbortController();
            const { signal } = abortController;

            const width = 3.0 / zoom;
            const height = 3.0 / zoom;
            const left = centerX - width / 2;
            const top = centerY - height / 2;

            const maxIter = Math.min(50 + Math.floor(zoom / 10), 150);

            for (let py = 0; py < canvas.height; py++) {
                if (signal.aborted) {
                    break;
                }
                const rowImage = ctx.createImageData(canvas.width, 1);
                const rowData = rowImage.data;

                for (let px = 0; px < canvas.width; px++) {
                    if (signal.aborted) break;
                    const x = left + (px / canvas.width) * width;
                    const y = top + (py / canvas.height) * height;

                    const iteration = mandelbrot(x, y, maxIter);
                    const [r, g, b] = getColor(iteration, maxIter);

                    const idx = px * 4;
                    rowData[idx] = r;
                    rowData[idx + 1] = g;
                    rowData[idx + 2] = b;
                    rowData[idx + 3] = 255;
                }

                ctx.putImageData(rowImage, 0, py);

                if (py % 8 === 0) {
                    await new Promise(resolve => setTimeout(resolve, 16));
                }
            }
            
            isRendering = false;
            if (startBtn) {
                startBtn.disabled = false;
                startBtn.textContent = 'Render';
            }
        }
        
        // Attach start button handler; do not auto-render
        if (startBtn) {
            startBtn.addEventListener('click', () => {
                // If currently rendering, abort and clear canvas to reset
                if (isRendering && abortController) {
                    abortController.abort();
                }
                // Reset canvas and status, then start fresh
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                render(defaultView.centerX, defaultView.centerY, defaultView.zoom);
            });
        }
    </script>
</body>
</html>
