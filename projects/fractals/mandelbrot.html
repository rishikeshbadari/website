<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandelbrot Set Fractal</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        canvas {
            border: 1px solid #333;
            background: #000;
            border-radius: 8px;
        }
        .info {
            max-width: 600px;
            margin-top: 20px;
            text-align: center;
            color: #ccc;
        }
        .status {
            margin-top: 10px;
            color: #FFD700;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>Mandelbrot Set Fractal</h1>
    <canvas id="canvas" width="600" height="600"></canvas>
    <div class="status" id="status">Generating Mandelbrot Set...</div>
    <div class="info">
        <p>The Mandelbrot Set is the set of complex numbers c for which the sequence z₀ = 0, z_{n+1} = z_n² + c does not diverge. Watch as the algorithm automatically explores interesting regions of infinite complexity.</p>
        <p>Current view: <span id="viewInfo">Overview</span></p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusElement = document.getElementById('status');
        const viewInfoElement = document.getElementById('viewInfo');
        
        let animationPhase = 0;
        let isRendering = false;
        
        // Interesting zoom locations
        const zoomSequence = [
            { centerX: -0.5, centerY: 0, zoom: 1, name: "Full Overview", duration: 3000 },
            { centerX: -0.8, centerY: 0.156, zoom: 50, name: "Lightning bolts", duration: 4000 },
            { centerX: -0.74529, centerY: 0.11307, zoom: 200, name: "Spiral detail", duration: 4000 },
            { centerX: -0.16, centerY: 1.0405, zoom: 100, name: "Seahorse valley", duration: 4000 },
            { centerX: -1.25066, centerY: 0.02012, zoom: 300, name: "Mini mandelbrot", duration: 4000 },
            { centerX: -0.7269, centerY: 0.1889, zoom: 400, name: "Feather detail", duration: 4000 }
        ];
        
        function mandelbrot(cx, cy, maxIter = 100) {
            let x = 0, y = 0;
            let iteration = 0;
            
            while (x*x + y*y <= 4 && iteration < maxIter) {
                const xtemp = x*x - y*y + cx;
                y = 2*x*y + cy;
                x = xtemp;
                iteration++;
            }
            
            return iteration;
        }
        
        function getColor(iteration, maxIter) {
            if (iteration === maxIter) {
                return [0, 0, 0]; // Black for points in the set
            }
            
            const t = iteration / maxIter;
            const r = Math.floor(255 * (0.5 + 0.5 * Math.cos(3.0 + t * 12.0)));
            const g = Math.floor(255 * (0.5 + 0.5 * Math.cos(3.0 + t * 12.0 + 2.0)));
            const b = Math.floor(255 * (0.5 + 0.5 * Math.cos(3.0 + t * 12.0 + 4.0)));
            
            return [r, g, b];
        }
        
        async function render(centerX, centerY, zoom) {
            if (isRendering) return;
            isRendering = true;
            statusElement.textContent = 'Rendering...';
            
            const imageData = ctx.createImageData(canvas.width, canvas.height);
            const data = imageData.data;
            
            const width = 3.0 / zoom;
            const height = 3.0 / zoom;
            const left = centerX - width / 2;
            const top = centerY - height / 2;
            
            const maxIter = Math.min(50 + Math.floor(zoom / 10), 150);
            
            for (let py = 0; py < canvas.height; py++) {
                for (let px = 0; px < canvas.width; px++) {
                    const x = left + (px / canvas.width) * width;
                    const y = top + (py / canvas.height) * height;
                    
                    const iteration = mandelbrot(x, y, maxIter);
                    const [r, g, b] = getColor(iteration, maxIter);
                    
                    const index = (py * canvas.width + px) * 4;
                    data[index] = r;
                    data[index + 1] = g;
                    data[index + 2] = b;
                    data[index + 3] = 255;
                }
                
                // Update progress occasionally
                if (py % 25 === 0) {
                    const progress = Math.floor((py / canvas.height) * 100);
                    statusElement.textContent = `Rendering... ${progress}%`;
                    await new Promise(resolve => setTimeout(resolve, 1));
                }
            }
            
            ctx.putImageData(imageData, 0, 0);
            statusElement.textContent = 'Exploring the infinite complexity of the Mandelbrot Set';
            isRendering = false;
        }
        
        async function animateSequence() {
            const currentZoom = zoomSequence[animationPhase];
            viewInfoElement.textContent = currentZoom.name;
            
            await render(currentZoom.centerX, currentZoom.centerY, currentZoom.zoom);
            
            setTimeout(() => {
                animationPhase = (animationPhase + 1) % zoomSequence.length;
                animateSequence();
            }, currentZoom.duration);
        }
        
        // Start the animation sequence
        setTimeout(() => {
            animateSequence();
        }, 1000);
    </script>
</body>
</html>
